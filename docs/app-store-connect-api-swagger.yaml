              type: "object"
              properties:
                sourceFileChecksum:
                  type: "string"
                  description: "上传文件的校验和"
                uploaded:
                  type: "boolean"
                  description: "设置为 true 确认上传完成"
                previewFrameTimeCode:
                  type: "string"
                  description: "预览帧时间码（格式：HH:MM:SS.sss）"

    # ==================== 审核提交相关 ====================
    AppStoreVersionSubmission:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appStoreVersionSubmissions"]

    AppStoreVersionSubmissionCreateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["type", "relationships"]
          properties:
            type:
              type: "string"
              enum: ["appStoreVersionSubmissions"]
            relationships:
              type: "object"
              required: ["appStoreVersion"]
              properties:
                appStoreVersion:
                  type: "object"
                  required: ["data"]
                  properties:
                    data:
                      type: "object"
                      properties:
                        type:
                          type: "string"
                          enum: ["appStoreVersions"]
                        id:
                          type: "string"

    AppStoreVersionSubmissionResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppStoreVersionSubmission"

    ReviewSubmission:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["reviewSubmissions"]
        attributes:
          type: "object"
          properties:
            state:
              type: "string"
              enum: ["OPEN", "WAITING_FOR_REVIEW", "IN_REVIEW", "UNRESOLVED_ISSUES", "CANCELING", "COMPLETING", "COMPLETE"]
            submittedDate:
              type: "string"
              format: "date-time"

    ReviewSubmissionCreateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["type", "relationships"]
          properties:
            type:
              type: "string"
              enum: ["reviewSubmissions"]
            relationships:
              type: "object"
              required: ["app"]
              properties:
                app:
                  type: "object"
                  required: ["data"]
                  properties:
                    data:
                      type: "object"
                      properties:
                        type:
                          type: "string"
                          enum: ["apps"]
                        id:
                          type: "string"

    ReviewSubmissionResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/ReviewSubmission"

    ReviewSubmissionUpdateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["id", "type"]
          properties:
            id:
              type: "string"
            type:
              type: "string"
              enum: ["reviewSubmissions"]
            attributes:
              type: "object"
              properties:
                submitted:
                  type: "boolean"
                  description: "设置为 true 提交审核，设置为 false 取消审核"

    # ==================== 应用信息相关 ====================
    AppInfo:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appInfos"]
        attributes:
          type: "object"
          properties:
            appStoreState:
              type: "string"
            state:
              type: "string"
            appStoreAgeRating:
              type: "string"
            primaryCategory:
              type: "string"
            secondaryCategory:
              type: "string"

    AppInfosResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/AppInfo"

    # ==================== 审核详情相关 ====================
    AppStoreReviewDetail:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appStoreReviewDetails"]
        attributes:
          type: "object"
          properties:
            contactFirstName:
              type: "string"
            contactLastName:
              type: "string"
            contactPhone:
              type: "string"
            contactEmail:
              type: "string"
            demoAccountName:
              type: "string"
            demoAccountPassword:
              type: "string"
            demoAccountRequired:
              type: "boolean"
            notes:
              type: "string"

    AppStoreReviewDetailResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppStoreReviewDetail"

    AppStoreReviewDetailCreateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["type", "attributes", "relationships"]
          properties:
            type:
              type: "string"
              enum: ["appStoreReviewDetails"]
            attributes:
              type: "object"
              properties:
                contactFirstName:
                  type: "string"
                contactLastName:
                  type: "string"
                contactPhone:
                  type: "string"
                contactEmail:
                  type: "string"
                demoAccountName:
                  type: "string"
                demoAccountPassword:
                  type: "string"
                demoAccountRequired:
                  type: "boolean"
                notes:
                  type: "string"
            relationships:
              type: "object"
              required: ["appStoreVersion"]
              properties:
                appStoreVersion:
                  type: "object"
                  required: ["data"]
                  properties:
                    data:
                      type: "object"
                      required: ["type", "id"]
                      properties:
                        type:
                          type: "string"
                          enum: ["appStoreVersions"]
                        id:
                          type: "string"

    AppStoreReviewDetailUpdateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["id", "type"]
          properties:
            id:
              type: "string"
            type:
              type: "string"
              enum: ["appStoreReviewDetails"]
            attributes:
              type: "object"
              properties:
                contactFirstName:
                  type: "string"
                contactLastName:
                  type: "string"
                contactPhone:
                  type: "string"
                contactEmail:
                  type: "string"
                demoAccountName:
                  type: "string"
                demoAccountPassword:
                  type: "string"
                demoAccountRequired:
                  type: "boolean"
                notes:
                  type: "string"

    # ==================== 可用性相关 ====================
    AppAvailability:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appAvailabilities"]
        attributes:
          type: "object"
          properties:
            availableInNewTerritories:
              type: "boolean"
            territoryAvailabilities:
              type: "array"
              items:
                type: "object"
                properties:
                  territory:
                    type: "string"
                  available:
                    type: "boolean"
                  preOrderEnabled:
                    type: "boolean"

    AppAvailabilityResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppAvailability"

    # ==================== 价格计划相关 ====================
    AppPriceSchedule:
      type: "object"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appPriceSchedules"]

    AppPriceScheduleResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppPriceSchedule"

    # ==================== 通用类型 ====================
    ImageAsset:
      type: "object"
      properties:
        templateUrl:
          type: "string"
          description: "图片 URL 模板，{w} 和 {h} 替换为宽度和高度"
        width:
          type: "integer"
        height:
          type: "integer"

    VideoAsset:
      type: "object"
      properties:
        templateUrl:
          type: "string"
          description: "视频 URL 模板"
        width:
          type: "integer"
        height:
          type: "integer"
        duration:
          type: "number"
          description: "视频时长（秒）"

    UploadOperation:
      type: "object"
      description: "上传操作信息，用于指导文件上传"
      properties:
        method:
          type: "string"
          enum: ["POST", "PUT"]
        url:
          type: "string"
          description: "上传 URL"
        length:
          type: "integer"
          description: "上传数据长度"
        offset:
          type: "integer"
          description: "上传偏移量"
        requestHeaders:
          type: "array"
          items:
            type: "object"
            properties:
              name:
                type: "string"
              value:
                type: "string"

    PagingLinks:
      type: "object"
      properties:
        self:
          type: "string"
        next:
          type: "string"
        first:
          type: "string"

    PagingInformation:
      type: "object"
      properties:
        paging:
          type: "object"
          properties:
            total:
              type: "integer"
            limit:
              type: "integer"

    # ==================== 错误响应 ====================
    ErrorResponse:
      type: "object"
      properties:
        errors:
          type: "array"
          items:
            type: "object"
            properties:
              id:
                type: "string"
              status:
                type: "string"
              code:
                type: "string"
              title:
                type: "string"
              detail:
                type: "string"
              source:
                type: "object"
                properties:
                  pointer:
                    type: "string"

  responses:
    BadRequest:
      description: "请求参数错误"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Unauthorized:
      description: "认证失败"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Forbidden:
      description: "权限不足"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    NotFound:
      description: "资源不存在"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: "Apps - 应用管理"
    description: "管理 App Store Connect 中的应用"
  - name: "App Store Versions - 版本管理"
    description: "管理应用的 App Store 版本"
  - name: "App Store Version Localizations - 本地化管理"
    description: "管理版本的本地化信息（描述、关键词等）"
  - name: "App Screenshot Sets - 截图集管理"
    description: "管理截图集（按设备类型分组）"
  - name: "App Screenshots - 截图管理"
    description: "上传和管理应用截图"
  - name: "App Preview Sets - 预览集管理"
    description: "管理预览视频集"
  - name: "App Previews - 预览管理"
    description: "上传和管理应用预览视频"
  - name: "Review Submissions - 审核提交"
    description: "管理应用审核提交流程"
  - name: "App Infos - 应用信息"
    description: "获取应用的 App Store 信息"
  - name: "App Store Review Details - 审核详情"
    description: "管理 App Review 所需信息"
  - name: "App Pricing - 应用定价"
    description: "管理应用价格计划"
  - name: "App Availability - 应用可用性"
    description: "管理应用在各地区的可用性"