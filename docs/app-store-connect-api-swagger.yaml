components:
  securitySchemes:
    bearerAuth:
      type: "http"
      scheme: "bearer"
      bearerFormat: "JWT"
      description: |
        使用 App Store Connect API 密钥生成的 JWT 令牌。
        
        ## 生成 JWT 令牌
        1. 从 App Store Connect 下载 API 密钥 (.p8 文件)
        2. 使用 ES256 算法签名 JWT
        3. JWT Header: {"alg": "ES256", "kid": "API_KEY_ID"}
        4. JWT Payload: {"iss": "ISSUER_ID", "iat": timestamp, "exp": timestamp, "aud": "appstoreconnect-v1"}
        
        ## 令牌有效期
        - 最长有效期: 20 分钟
        - 建议每 15 分钟刷新一次

  schemas:
    # ==================== 应用相关 ====================
    App:
      type: "object"
      description: "应用资源对象"
      properties:
        id:
          type: "string"
          description: "应用唯一标识符"
        type:
          type: "string"
          enum: ["apps"]
        attributes:
          type: "object"
          properties:
            name:
              type: "string"
              description: "应用名称"
            bundleId:
              type: "string"
              description: "应用 Bundle ID"
            sku:
              type: "string"
              description: "应用 SKU"
            primaryLocale:
              type: "string"
              description: "主要语言"
            isOrEverWasMadeForKids:
              type: "boolean"
              description: "是否为儿童应用"
            contentRightsDeclaration:
              type: "string"
              enum: ["DOES_NOT_USE_THIRD_PARTY_CONTENT", "USES_THIRD_PARTY_CONTENT"]
            streamlinedPurchasingEnabled:
              type: "boolean"
        relationships:
          type: "object"
          description: "关联资源"

    AppsResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/App"
        links:
          $ref: "#/components/schemas/PagingLinks"
        meta:
          $ref: "#/components/schemas/PagingInformation"

    AppResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/App"
        links:
          type: "object"

    AppUpdateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["id", "type"]
          properties:
            id:
              type: "string"
            type:
              type: "string"
              enum: ["apps"]
            attributes:
              type: "object"
              properties:
                primaryLocale:
                  type: "string"
                contentRightsDeclaration:
                  type: "string"
                subscriptionStatusUrl:
                  type: "string"

    # ==================== 版本相关 ====================
    AppStoreVersion:
      type: "object"
      description: "App Store 版本资源"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appStoreVersions"]
        attributes:
          type: "object"
          properties:
            platform:
              type: "string"
              enum: ["IOS", "MAC_OS", "TV_OS", "VISION_OS"]
            versionString:
              type: "string"
              description: "版本号（如 1.0.0）"
            appStoreState:
              type: "string"
              description: "App Store 状态"
            appVersionState:
              type: "string"
            copyright:
              type: "string"
              description: "版权信息"
            releaseType:
              type: "string"
              enum: ["MANUAL", "AFTER_APPROVAL", "SCHEDULED"]
            earliestReleaseDate:
              type: "string"
              format: "date-time"
            createdDate:
              type: "string"
              format: "date-time"

    AppStoreVersionsResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/AppStoreVersion"
        links:
          $ref: "#/components/schemas/PagingLinks"

    AppStoreVersionResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppStoreVersion"

    AppStoreVersionUpdateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["id", "type"]
          properties:
            id:
              type: "string"
            type:
              type: "string"
              enum: ["appStoreVersions"]
            attributes:
              type: "object"
              properties:
                copyright:
                  type: "string"
                releaseType:
                  type: "string"
                  enum: ["MANUAL", "AFTER_APPROVAL", "SCHEDULED"]
                earliestReleaseDate:
                  type: "string"
                  format: "date-time"
                usesIdfa:
                  type: "boolean"
                reviewType:
                  type: "string"
                  enum: ["APP_STORE", "NOTIFICATIONS"]

    # ==================== 本地化相关 ====================
    AppStoreVersionLocalization:
      type: "object"
      description: "版本本地化资源"
      properties:
        id:
          type: "string"
        type:
          type: "string"
          enum: ["appStoreVersionLocalizations"]
        attributes:
          type: "object"
          properties:
            description:
              type: "string"
              description: "应用描述"
            keywords:
              type: "string"
              description: "关键词"
            marketingUrl:
              type: "string"
              description: "营销 URL"
            promotionalText:
              type: "string"
              description: "推广文本"
            supportUrl:
              type: "string"
              description: "支持 URL"
            whatsNew:
              type: "string"
              description: "版本更新说明"
            locale:
              type: "string"
              description: "语言代码"

    AppStoreVersionLocalizationsResponse:
      type: "object"
      properties:
        data:
          type: "array"
          items:
            $ref: "#/components/schemas/AppStoreVersionLocalization"

    AppStoreVersionLocalizationResponse:
      type: "object"
      properties:
        data:
          $ref: "#/components/schemas/AppStoreVersionLocalization"

    AppStoreVersionLocalizationCreateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["type", "attributes", "relationships"]
          properties:
            type:
              type: "string"
              enum: ["appStoreVersionLocalizations"]
            attributes:
              type: "object"
              required: ["locale"]
              properties:
                description:
                  type: "string"
                  maxLength: 4000
                keywords:
                  type: "string"
                  maxLength: 100
                marketingUrl:
                  type: "string"
                promotionalText:
                  type: "string"
                  maxLength: 170
                supportUrl:
                  type: "string"
                whatsNew:
                  type: "string"
                  maxLength: 4000
                locale:
                  type: "string"
            relationships:
              type: "object"
              required: ["appStoreVersion"]
              properties:
                appStoreVersion:
                  type: "object"
                  required: ["data"]
                  properties:
                    data:
                      type: "object"
                      required: ["type", "id"]
                      properties:
                        type:
                          type: "string"
                          enum: ["appStoreVersions"]
                        id:
                          type: "string"

    AppStoreVersionLocalizationUpdateRequest:
      type: "object"
      required: ["data"]
      properties:
        data:
          type: "object"
          required: ["id", "type"]
          properties:
            id:
              type: "string"
            type:
              type: "string"
              enum: ["appStoreVersionLocalizations"]
            attributes:
              type: "object"
              properties:
                description:
