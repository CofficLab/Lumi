openapi: "3.0.0"
info:
  title: "App Store Connect API - Lumi Plugin Integration"
  description: |
    App Store Connect API 规范文档，用于 Lumi IDE 插件开发。
    基于 Apple 官方 API 文档整理，包含应用管理、版本控制、审核提交、截图管理等核心功能。
    
    ## 认证方式
    - 使用 JWT (JSON Web Token) 进行身份验证
    - 需要 App Store Connect API 密钥
    
    ## 基础 URL
    `https://api.appstoreconnect.apple.com`
    
    ## 主要功能模块
    1. **应用管理** - 管理应用基本信息
    2. **版本管理** - 管理 App Store 版本
    3. **本地化管理** - 管理多语言元数据
    4. **截图管理** - 上传和管理应用截图
    5. **预览管理** - 上传和管理应用预览视频
    6. **审核提交** - 提交应用审核
    7. **定价管理** - 管理应用价格
    8. **可用性管理** - 管理应用在各地区的可用性
    
    ## 开发指南
    ### 截图上传流程
    1. 创建 App Screenshot Set
    2. 创建 App Screenshot 资源
    3. 获取上传 URL
    4. 上传图片到 Apple 服务器
    5. 确认上传完成
    
    ### 预览视频上传流程
    1. 创建 App Preview Set
    2. 创建 App Preview 资源
    3. 获取上传 URL
    4. 上传视频到 Apple 服务器
    5. 确认上传完成
    
    ### 审核提交流程
    1. 创建 Review Submission
    2. 添加 Review Submission Items
    3. 提交审核
    4. 等待审核结果
  version: "1.0.0"
  contact:
    name: "Lumi Plugin Development"
  license:
    name: "Apple Developer Documentation"

servers:
  - url: "https://api.appstoreconnect.apple.com"
    description: "App Store Connect API 生产环境"

security:
  - bearerAuth: []

paths:
  # ==================== 应用管理 ====================
  /v1/apps:
    get:
      tags:
        - "Apps - 应用管理"
      summary: "获取应用列表"
      description: "查找和列出 App Store Connect 中的所有应用"
      operationId: "listApps"
      parameters:
        - name: "filter[name]"
          in: "query"
          description: "按应用名称过滤"
          schema:
            type: "string"
        - name: "filter[bundleId]"
          in: "query"
          description: "按 Bundle ID 过滤"
          schema:
            type: "string"
        - name: "limit"
          in: "query"
          description: "返回结果数量限制（最大 200）"
          schema:
            type: "integer"
            maximum: 200
            default: 50
        - name: "sort"
          in: "query"
          description: "排序字段"
          schema:
            type: "string"
            enum: ["name", "-name", "bundleId", "-bundleId"]
        - name: "fields[apps]"
          in: "query"
          description: "指定返回的字段"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "name", "bundleId", "sku", "primaryLocale", "isOrEverWasMadeForKids",
                "contentRightsDeclaration", "streamlinedPurchasingEnabled"
              ]
        - name: "include"
          in: "query"
          description: "包含的关联资源"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "appInfos", "appStoreVersions", "preReleaseVersions", "builds",
                "betaGroups", "betaAppLocalizations", "betaLicenseAgreement",
                "betaAppReviewDetail", "appClips", "endUserLicenseAgreement",
                "inAppPurchases", "subscriptionGroups", "appCustomProductPages",
                "appStoreVersionExperimentsV2", "alternativeDistributionKey"
              ]
      responses:
        "200":
          description: "成功返回应用列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/apps/{id}:
    get:
      tags:
        - "Apps - 应用管理"
      summary: "获取单个应用详情"
      description: "获取特定应用的详细信息"
      operationId: "readAppInformation"
      parameters:
        - name: "id"
          in: "path"
          required: true
          description: "应用的唯一标识符"
          schema:
            type: "string"
        - name: "fields[apps]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
        - name: "include"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
      responses:
        "200":
          description: "成功返回应用详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags:
        - "Apps - 应用管理"
      summary: "更新应用信息"
      description: "更新应用的 Bundle ID、主要语言等信息"
      operationId: "modifyApp"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppUpdateRequest"
      responses:
        "200":
          description: "应用更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse"

  # ==================== 应用版本管理 ====================
  /v1/apps/{id}/appStoreVersions:
    get:
      tags:
        - "App Store Versions - 版本管理"
      summary: "获取应用的所有版本"
      description: "获取特定应用的所有 App Store 版本列表"
      operationId: "listAppStoreVersions"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "filter[appStoreState]"
          in: "query"
          description: "按版本状态过滤"
          schema:
            type: "string"
            enum: [
              "ACCEPTED", "DEVELOPER_REJECTED", "IN_REVIEW",
              "INVALID_BINARY", "METADATA_REJECTED", "PREPARE_FOR_SUBMISSION",
              "READY_FOR_DISTRIBUTION", "READY_FOR_REVIEW", "REJECTED",
              "WAITING_FOR_REVIEW"
            ]
        - name: "filter[platform]"
          in: "query"
          schema:
            type: "string"
            enum: ["IOS", "MAC_OS", "TV_OS", "VISION_OS"]
        - name: "filter[versionString]"
          in: "query"
          schema:
            type: "string"
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
            maximum: 200
      responses:
        "200":
          description: "成功返回版本列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionsResponse"

  /v1/appStoreVersions/{id}:
    get:
      tags:
        - "App Store Versions - 版本管理"
      summary: "获取版本详情"
      description: "获取特定 App Store 版本的详细信息"
      operationId: "readAppStoreVersion"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "fields[appStoreVersions]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "platform", "versionString", "appStoreState", "appVersionState",
                "copyright", "reviewType", "releaseType", "earliestReleaseDate",
                "usesIdfa", "downloadable", "createdDate"
              ]
        - name: "include"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "app", "appStoreVersionLocalizations", "build", "appStoreVersionPhasedRelease",
                "gameCenterAppVersion", "routingAppCoverage", "appStoreReviewDetail",
                "appStoreVersionSubmissions", "appClipDefaultExperience",
                "appStoreVersionExperiments", "appStoreVersionExperimentsV2",
                "alternativeDistributionPackage", "appStoreVersionAttachments"
              ]
      responses:
        "200":
          description: "成功返回版本详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionResponse"

    patch:
      tags:
        - "App Store Versions - 版本管理"
      summary: "更新版本信息"
      description: "更新 App Store 版本的元数据"
      operationId: "modifyAppStoreVersion"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppStoreVersionUpdateRequest"
      responses:
        "200":
          description: "版本更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionResponse"

  # ==================== 版本本地化 ====================
  /v1/appStoreVersions/{id}/appStoreVersionLocalizations:
    get:
      tags:
        - "App Store Version Localizations - 本地化管理"
      summary: "获取版本本地化信息"
      description: "获取特定版本的所有本地化信息"
      operationId: "listAppStoreVersionLocalizations"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "fields[appStoreVersionLocalizations]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "description", "keywords", "marketingUrl", "promotionalText",
                "supportUrl", "whatsNew", "locale"
              ]
      responses:
        "200":
          description: "成功返回本地化信息"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionLocalizationsResponse"

  /v1/appStoreVersionLocalizations:
    post:
      tags:
        - "App Store Version Localizations - 本地化管理"
      summary: "创建版本本地化"
      description: "为应用版本创建新的本地化信息"
      operationId: "createAppStoreVersionLocalization"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppStoreVersionLocalizationCreateRequest"
      responses:
        "201":
          description: "本地化创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionLocalizationResponse"

  /v1/appStoreVersionLocalizations/{id}:
    get:
      tags:
        - "App Store Version Localizations - 本地化管理"
      summary: "获取单个本地化信息"
      operationId: "readAppStoreVersionLocalization"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "成功返回本地化信息"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionLocalizationResponse"

    patch:
      tags:
        - "App Store Version Localizations - 本地化管理"
      summary: "更新本地化信息"
      description: "更新应用版本的本地化元数据（描述、关键词、更新说明等）"
      operationId: "modifyAppStoreVersionLocalization"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppStoreVersionLocalizationUpdateRequest"
      responses:
        "200":
          description: "本地化信息更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppStoreVersionLocalizationResponse"

  # ==================== 截图集管理 ====================
  /v1/appStoreVersionLocalizations/{id}/appScreenshotSets:
    get:
      tags:
        - "App Screenshot Sets - 截图集管理"
      summary: "获取本地化的截图集"
      description: "获取特定本地化的所有截图集"
      operationId: "listAppScreenshotSets"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "filter[appScreenshotSetType]"
          in: "query"
          description: "按截图集类型过滤"
          schema:
            type: "string"
            enum: [
              "APP_IPHONE_67", "APP_IPHONE_65", "APP_IPHONE_58",
              "APP_IPHONE_55", "APP_IPHONE_47", "APP_IPAD_PRO_129",
              "APP_IPAD_PRO_11", "APP_IPAD_105", "APP_DESKTOP",
              "APP_WATCH_SERIES_9", "APP_WATCH_ULTRA", "APP_APPLE_TV_4K"
            ]
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
            maximum: 200
      responses:
        "200":
          description: "成功返回截图集列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotSetsResponse"

  /v1/appScreenshotSets:
    post:
      tags:
        - "App Screenshot Sets - 截图集管理"
      summary: "创建截图集"
      description: "为本地化创建新的截图集"
      operationId: "createAppScreenshotSet"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppScreenshotSetCreateRequest"
      responses:
        "201":
          description: "截图集创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotSetResponse"

  /v1/appScreenshotSets/{id}:
    get:
      tags:
        - "App Screenshot Sets - 截图集管理"
      summary: "获取截图集详情"
      operationId: "readAppScreenshotSet"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "成功返回截图集详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotSetResponse"

    delete:
      tags:
        - "App Screenshot Sets - 截图集管理"
      summary: "删除截图集"
      operationId: "deleteAppScreenshotSet"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "204":
          description: "截图集删除成功"

  # ==================== 截图管理 ====================
  /v1/appScreenshotSets/{id}/appScreenshots:
    get:
      tags:
        - "App Screenshots - 截图管理"
      summary: "获取截图集中的所有截图"
      description: "获取特定截图集中的所有截图"
      operationId: "listAppScreenshots"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "fields[appScreenshots]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "fileName", "fileSize", "sourceFileChecksum", "imageAsset",
                "assetToken", "assetType", "uploadOperations", "uploaded"
              ]
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
            maximum: 200
      responses:
        "200":
          description: "成功返回截图列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotsResponse"

  /v1/appScreenshots:
    post:
      tags:
        - "App Screenshots - 截图管理"
      summary: "创建截图资源"
      description: "为截图集创建新的截图资源，获取上传 URL"
      operationId: "createAppScreenshot"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppScreenshotCreateRequest"
      responses:
        "201":
          description: "截图资源创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotResponse"

  /v1/appScreenshots/{id}:
    get:
      tags:
        - "App Screenshots - 截图管理"
      summary: "获取截图详情"
      operationId: "readAppScreenshot"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "成功返回截图详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotResponse"

    patch:
      tags:
        - "App Screenshots - 截图管理"
      summary: "确认截图上传完成"
      description: "截图上传到 Apple 服务器后，调用此接口确认上传完成"
      operationId: "modifyAppScreenshot"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppScreenshotUpdateRequest"
      responses:
        "200":
          description: "截图更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppScreenshotResponse"

    delete:
      tags:
        - "App Screenshots - 截图管理"
      summary: "删除截图"
      operationId: "deleteAppScreenshot"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "204":
          description: "截图删除成功"

  # ==================== 预览集管理 ====================
  /v1/appStoreVersionLocalizations/{id}/appPreviewSets:
    get:
      tags:
        - "App Preview Sets - 预览集管理"
      summary: "获取本地化的预览集"
      description: "获取特定本地化的所有预览集"
      operationId: "listAppPreviewSets"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "filter[appPreviewSetType]"
          in: "query"
          schema:
            type: "string"
            enum: [
              "APP_IPHONE_67", "APP_IPHONE_65", "APP_IPHONE_58",
              "APP_IPHONE_55", "APP_IPHONE_47", "APP_IPAD_PRO_129",
              "APP_IPAD_PRO_11", "APP_IPAD_105", "APP_DESKTOP",
              "APP_WATCH_SERIES_9", "APP_WATCH_ULTRA", "APP_APPLE_TV_4K"
            ]
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
            maximum: 200
      responses:
        "200":
          description: "成功返回预览集列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewSetsResponse"

  /v1/appPreviewSets:
    post:
      tags:
        - "App Preview Sets - 预览集管理"
      summary: "创建预览集"
      description: "为本地化创建新的预览集"
      operationId: "createAppPreviewSet"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppPreviewSetCreateRequest"
      responses:
        "201":
          description: "预览集创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewSetResponse"

  /v1/appPreviewSets/{id}:
    get:
      tags:
        - "App Preview Sets - 预览集管理"
      summary: "获取预览集详情"
      operationId: "readAppPreviewSet"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "成功返回预览集详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewSetResponse"

    delete:
      tags:
        - "App Preview Sets - 预览集管理"
      summary: "删除预览集"
      operationId: "deleteAppPreviewSet"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "204":
          description: "预览集删除成功"

  # ==================== 预览管理 ====================
  /v1/appPreviewSets/{id}/appPreviews:
    get:
      tags:
        - "App Previews - 预览管理"
      summary: "获取预览集中的所有预览"
      description: "获取特定预览集中的所有预览视频"
      operationId: "listAppPreviews"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
        - name: "fields[appPreviews]"
          in: "query"
          schema:
            type: "array"
            items:
              type: "string"
              enum: [
                "fileName", "fileSize", "sourceFileChecksum", "videoAsset",
                "previewFrameTimeCode", "previewImage", "uploadOperations", "uploaded"
              ]
        - name: "limit"
          in: "query"
          schema:
            type: "integer"
            maximum: 200
      responses:
        "200":
          description: "成功返回预览列表"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewsResponse"

  /v1/appPreviews:
    post:
      tags:
        - "App Previews - 预览管理"
      summary: "创建预览资源"
      description: "为预览集创建新的预览资源，获取上传 URL"
      operationId: "createAppPreview"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppPreviewCreateRequest"
      responses:
        "201":
          description: "预览资源创建成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewResponse"

  /v1/appPreviews/{id}:
    get:
      tags:
        - "App Previews - 预览管理"
      summary: "获取预览详情"
      operationId: "readAppPreview"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      responses:
        "200":
          description: "成功返回预览详情"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewResponse"

    patch:
      tags:
        - "App Previews - 预览管理"
      summary: "确认预览上传完成"
      description: "预览视频上传到 Apple 服务器后，调用此接口确认上传完成"
      operationId: "modifyAppPreview"
      parameters:
        - name: "id"
          in: "path"
          required: true
          schema:
            type: "string"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppPreviewUpdateRequest"
      responses:
        "200":
          description: "预览更新成功"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppPreviewResponse"

