name: Release

on:
  push:
    branches:
      - pre
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # 基础环境变量
  SCHEME: Lumi
  REPO_LINK: "https://github.com/CofficLab/Lumi"
  DESTINATION: "generic/platform=macOS"
  ENTITLEMENTS_PATH: "LumiApp/App.entitlements"
  DERIVED_DATA_PATH: "./DerivedData"
  ArchivePath: "./my-app"
  BuildPath: "./temp"
  RELEASE_ARCHS: "arm64 x86_64"
  DEFAULT_UPDATE_ARCH: "arm64"
  SPARKLE_VERSION: "2.9.1"

  # Secrets
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
  BUILD_CERTIFICATE_P12_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_P12_PASSWORD }}
  APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
  APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
  APP_STORE_CONNECT_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ISSUER_ID }}
  SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY_GITOK }}

jobs:
  release_pipeline:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      # =================================================================================================
      # 1. 版本计算与项目更新
      # =================================================================================================
      - name: Calculate Next Version
        id: version
        run: |
          chmod +x .github/scripts/bump-version.sh
          chmod +x .github/scripts/calculate-version.sh

          # 获取当前版本 (仅用于显示)
          LAST_TAG=$(git tag -l "v*" | sort -V | tail -n 1 2>/dev/null || echo "v0.0.0")
          LAST_TAG="${LAST_TAG#v}"

          # 计算新版本
          NEW_VERSION=$(.github/scripts/calculate-version.sh)
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV

          # 保存上一个标签供 changelog 生成使用
          echo "previous_tag=$LAST_TAG" >> $GITHUB_ENV

          # 输出摘要
          echo "## 📊 版本计算" >> $GITHUB_STEP_SUMMARY
          echo "- **上一个版本**: \`$LAST_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **新版本**: \`$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY

      - name: Update Xcode Project Version
        run: |
          set -euo pipefail

          echo "📝 Updating MARKETING_VERSION to ${{ env.new_version }}..."

          # 直接使用 sed 更新 project.pbxproj 中所有 target 的 MARKETING_VERSION
          # 不使用 agvtool，避免在 CI 环境中出现 "Cannot find YES" 错误
          BEFORE_COUNT=$(grep -c "MARKETING_VERSION = " Lumi.xcodeproj/project.pbxproj || echo "0")
          if [ "$BEFORE_COUNT" -eq 0 ]; then
            echo "❌ MARKETING_VERSION not found in project.pbxproj"
            exit 1
          fi

          sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.new_version }}/" Lumi.xcodeproj/project.pbxproj

          # 验证 sed 替换是否成功
          AFTER_COUNT=$(grep -c "MARKETING_VERSION = ${{ env.new_version }}" Lumi.xcodeproj/project.pbxproj || echo "0")
          if [ "$AFTER_COUNT" -eq 0 ]; then
            echo "❌ sed 替换 MARKETING_VERSION 失败，未找到任何匹配项被替换为 ${{ env.new_version }}"
            exit 1
          fi
          if [ "$AFTER_COUNT" -ne "$BEFORE_COUNT" ]; then
            echo "❌ MARKETING_VERSION 替换数量不匹配: 替换前 $BEFORE_COUNT 处，替换后匹配 $AFTER_COUNT 处"
            exit 1
          fi

          echo "✅ 替换了 $AFTER_COUNT 处 MARKETING_VERSION"

      - name: Update Build Number
        run: |
          set -euo pipefail

          echo "📝 Updating CURRENT_PROJECT_VERSION..."

          # 直接从 project.pbxproj 读取当前构建号（避免依赖 xcodebuild 解析 SPM 包依赖）
          CURRENT_BUILD=$(grep -m1 "CURRENT_PROJECT_VERSION = " Lumi.xcodeproj/project.pbxproj | sed 's/.*CURRENT_PROJECT_VERSION = \([0-9]*\);/\1/')
          if [ -z "$CURRENT_BUILD" ]; then
            echo "❌ 无法从 project.pbxproj 获取当前 CURRENT_PROJECT_VERSION"
            exit 1
          fi
          NEW_BUILD_VERSION=$((CURRENT_BUILD + 1))
          echo "  Build number: $CURRENT_BUILD → $NEW_BUILD_VERSION"

          # 使用 sed 更新所有 target 的 CURRENT_PROJECT_VERSION
          BEFORE_COUNT=$(grep -c "CURRENT_PROJECT_VERSION = " Lumi.xcodeproj/project.pbxproj || echo "0")
          if [ "$BEFORE_COUNT" -eq 0 ]; then
            echo "❌ CURRENT_PROJECT_VERSION not found in project.pbxproj"
            exit 1
          fi

          sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = $NEW_BUILD_VERSION/" Lumi.xcodeproj/project.pbxproj

          # 验证 sed 替换是否成功
          AFTER_COUNT=$(grep -c "CURRENT_PROJECT_VERSION = $NEW_BUILD_VERSION" Lumi.xcodeproj/project.pbxproj || echo "0")
          if [ "$AFTER_COUNT" -eq 0 ]; then
            echo "❌ sed 替换 CURRENT_PROJECT_VERSION 失败"
            exit 1
          fi
          if [ "$AFTER_COUNT" -ne "$BEFORE_COUNT" ]; then
            echo "❌ CURRENT_PROJECT_VERSION 替换数量不匹配: 替换前 $BEFORE_COUNT 处，替换后匹配 $AFTER_COUNT 处"
            exit 1
          fi

          echo "✅ 替换了 $AFTER_COUNT 处 CURRENT_PROJECT_VERSION"

          # 保存构建号供后续步骤使用
          echo "build_number=$NEW_BUILD_VERSION" >> $GITHUB_ENV

      - name: Determine Tag and Prerelease Status
        run: |
          BUILD_VERSION="${{ env.build_number }}"

          if [[ "${{ github.ref }}" == "refs/heads/pre" ]]; then
            TAG_NAME="p${{ env.new_version }}($BUILD_VERSION)"
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "## 🏷️ Tag Info (Pre-release)" >> $GITHUB_STEP_SUMMARY
          else
            TAG_NAME="v${{ env.new_version }}"
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "## 🏷️ Tag Info (Release)" >> $GITHUB_STEP_SUMMARY
          fi

          echo "tag=$TAG_NAME" >> $GITHUB_ENV
          echo "- **Tag**: \`$TAG_NAME\`" >> $GITHUB_STEP_SUMMARY

      # =================================================================================================
      # 2. 构建与签名
      # =================================================================================================
      - name: Setup macOS signing
        id: signing
        run: |
          chmod +x ./.github/scripts/setup-macos-signing.sh
          source ./.github/scripts/setup-macos-signing.sh
          echo "signing_identity=$SIGNING_IDENTITY" >> $GITHUB_OUTPUT
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT
          echo "api_key_path=$API_KEY_PATH" >> $GITHUB_OUTPUT

      - name: Check Timestamp Service Availability
        run: |
          echo "🔍 Checking Apple timestamp service availability..."
          # Check if we can reach Apple's timestamp server
          for i in {1..3}; do
            if nc -z -w 5 timestamp.apple.com 80 2>/dev/null || \
               nc -z -w 5 ts.apple.com 80 2>/dev/null; then
              echo "✅ Timestamp service is reachable"
              exit 0
            fi
            echo "⚠️  Attempt $i: Timestamp service not reachable, retrying..."
            sleep 2
          done
          echo "⚠️ Timestamp service is not reachable after 3 attempts; continuing and letting codesign validate timestamping"

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Resolve SPM Dependencies
        run: |
          # Clean DerivedData first to avoid any cached dirty state
          rm -rf "${{ env.DERIVED_DATA_PATH }}/SourcePackages"
          mkdir -p "${{ env.DERIVED_DATA_PATH }}/SourcePackages"

          xcodebuild -project ${{ env.SCHEME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
            -resolvePackageDependencies \
            -skipPackagePluginValidation

      - name: Build App (Archive)
        run: |
          set -euo pipefail
          set -o pipefail
          mkdir -p ./temp

          # Verify SPM packages are resolved
          if [ ! -d "${{ env.DERIVED_DATA_PATH }}/SourcePackages/checkouts" ]; then
            echo "❌ SPM checkouts not found in DerivedData, re-resolving..."
            xcodebuild -project ${{ env.SCHEME }}.xcodeproj \
              -scheme ${{ env.SCHEME }} \
              -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
              -resolvePackageDependencies \
              -skipPackagePluginValidation
          fi
          echo "✅ SPM checkouts: $(ls ${{ env.DERIVED_DATA_PATH }}/SourcePackages/checkouts | wc -l | tr -d ' ') packages"

          FIRST_ARCH=true
          for arch in ${{ env.RELEASE_ARCHS }}; do
            echo "🏗️ Archiving ${{ env.SCHEME }} for $arch..."
            rm -rf "./temp/${{ env.SCHEME }}-${arch}.xcarchive"

            xcodebuild archive \
              -project ${{ env.SCHEME }}.xcodeproj \
              -scheme ${{ env.SCHEME }} \
              -destination "${{ env.DESTINATION }}" \
              -derivedDataPath "${{ env.DERIVED_DATA_PATH }}" \
              -archivePath "./temp/${{ env.SCHEME }}-${arch}.xcarchive" \
              -configuration Release \
              -skipPackagePluginValidation \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="-" \
              DEVELOPMENT_TEAM="${{ steps.signing.outputs.team_id }}" \
              PROVISIONING_PROFILE_SPECIFIER="" \
              CODE_SIGNING_REQUIRED=NO \
              AD_HOC_CODE_SIGNING_ALLOWED=YES \
              ARCHS="$arch" \
              ONLY_ACTIVE_ARCH=NO

            FIRST_ARCH=false
          done

      - name: Codesign App
        run: |
          set -euo pipefail

          IDENTITY="${{ steps.signing.outputs.signing_identity }}"

          # 使用脚本进行深度签名
          chmod +x .github/scripts/sign_app.sh

          for arch in ${{ env.RELEASE_ARCHS }}; do
            ARCHIVE_APP="./temp/${{ env.SCHEME }}-${arch}.xcarchive/Products/Applications/${{ env.SCHEME }}.app"
            APP_PATH="./temp/${{ env.SCHEME }}-${arch}.app"

            if [ ! -d "$ARCHIVE_APP" ]; then
              echo "❌ Archived app not found: $ARCHIVE_APP"
              exit 1
            fi

            # 从 xcarchive 中提取 App (使用 ditto 保持符号链接和元数据)
            rm -rf "$APP_PATH"
            ditto "$ARCHIVE_APP" "$APP_PATH"

            BINARY_PATH="$APP_PATH/Contents/MacOS/${{ env.SCHEME }}"
            if ! lipo -archs "$BINARY_PATH" | tr ' ' '\n' | grep -qx "$arch"; then
              echo "❌ $BINARY_PATH does not contain expected architecture: $arch"
              lipo -archs "$BINARY_PATH" || true
              exit 1
            fi

            .github/scripts/sign_app.sh "$APP_PATH" "$IDENTITY" "${{ env.ENTITLEMENTS_PATH }}"
          done

      - name: Create DMG
        run: |
          set -euo pipefail

          for arch in ${{ env.RELEASE_ARCHS }}; do
            STAGING_DIR="./temp/dmg_staging_${arch}"
            VOL_NAME="${{ env.SCHEME }}-${arch}"
            DMG_NAME="./temp/${{ env.SCHEME }}_${{ env.new_version }}_${arch}.dmg"
            APP_PATH="./temp/${{ env.SCHEME }}-${arch}.app"

            if [ ! -d "$APP_PATH" ]; then
              echo "❌ Signed app not found: $APP_PATH"
              exit 1
            fi

            # 干净 staging，避免上次失败或增量残留导致 hdiutil 异常
            rm -rf "$STAGING_DIR"
            mkdir -p "$STAGING_DIR"
            ditto "$APP_PATH" "$STAGING_DIR/${{ env.SCHEME }}.app"
            ln -sfn /Applications "$STAGING_DIR/Applications"

            echo "Checking Staging Dir for $arch:"
            ls -la "$STAGING_DIR"

            # 降低 Spotlight 在 runner 上占用源目录导致 EBUSY 的概率
            mdutil -i off "$STAGING_DIR" 2>/dev/null || true
            mdutil -i off "./temp" 2>/dev/null || true
            sync
            sleep 1

            create_dmg() {
              # 同名卷若仍挂在 /Volumes（上次失败、并发、本地重跑），会导致 Resource busy
              hdiutil detach "/Volumes/${VOL_NAME}" -force 2>/dev/null || true
              rm -f "$DMG_NAME"
              if hdiutil create -volname "$VOL_NAME" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_NAME"; then
                return 0
              fi
              return 1
            }

            MAX_ATTEMPTS=6
            attempt=0
            until create_dmg; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
                echo "hdiutil create failed after $MAX_ATTEMPTS attempts (often Resource busy / EBUSY)"
                exit 1
              fi
              echo "hdiutil create failed for $arch (attempt $attempt/$MAX_ATTEMPTS), retrying after backoff..."
              sleep $((attempt * 3))
            done

            echo "Created: $DMG_NAME"
          done

      - name: Notary
        run: |
          set -euo pipefail

          if ! compgen -G "./temp/*.dmg" > /dev/null; then
            echo "DMG not found"
            exit 1
          fi

          for file in ./temp/*.dmg; do
            echo "📨 Notarizing $file..."
            result_file="notary_result_$(basename "$file" .dmg).txt"

            # Run submit and capture output
            set +e
            xcrun notarytool submit "$file" \
              --key ${{ steps.signing.outputs.api_key_path }} \
              --key-id=${{ env.APP_STORE_CONNECT_KEY_ID }} \
              --issuer ${{ env.APP_STORE_CONNECT_KEY_ISSUER_ID }} \
              --wait \
              --timeout 10m > "$result_file" 2>&1

            EXIT_CODE=$?
            set -e

            # Output result for debugging
            cat "$result_file"

            if [ $EXIT_CODE -ne 0 ] || grep -q "status: Invalid" "$result_file"; then
               echo "❌ Notarization failed for $file. Retrieving logs..."
               # Extract ID from the output file
               SUBMISSION_ID=$(grep "id:" "$result_file" | head -n 1 | awk '{print $2}' | tr -d ' ')
               if [ -n "$SUBMISSION_ID" ]; then
                  echo "Fetching log for Submission ID: $SUBMISSION_ID"
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --key ${{ steps.signing.outputs.api_key_path }} \
                    --key-id=${{ env.APP_STORE_CONNECT_KEY_ID }} \
                    --issuer ${{ env.APP_STORE_CONNECT_KEY_ISSUER_ID }}
               fi
               exit 1
            fi

            stapler staple "$file"
          done

      - name: Validate Notarization
        run: |
          set -euo pipefail
          for file in ./temp/*.dmg; do
            stapler validate "$file"
          done

      - name: Prepare Updates Directory
        run: |
          mkdir updates
          cp ./temp/*.dmg updates/
          ls -alh updates

      # =================================================================================================
      # 2.5 符号文件归档 (dSYM)
      # =================================================================================================
      - name: Package dSYMs
        run: |
          set -euo pipefail

          for arch in ${{ env.RELEASE_ARCHS }}; do
            DSYM_SOURCE="./temp/${{ env.SCHEME }}-${arch}.xcarchive/dSYMs"
            DSYM_ZIP="./temp/${{ env.SCHEME }}_${{ env.new_version }}_${arch}_dSYMs.zip"

            if [ -d "$DSYM_SOURCE" ]; then
              (cd "$DSYM_SOURCE" && zip -r "$GITHUB_WORKSPACE/$DSYM_ZIP" ./*.dSYM)
              echo "✅ dSYMs packaged for $arch: $(du -sh "$DSYM_ZIP" | cut -f1)"
              ls -lh "$DSYM_ZIP"
            else
              echo "⚠️ No dSYMs directory found in xcarchive for $arch"
              ls -R "./temp/${{ env.SCHEME }}-${arch}.xcarchive/" || true
            fi
          done

      # =================================================================================================
      # 2.6 生成 Changelog (仅 Release 分支，供 appcast 和 GitHub Release 使用)
      # =================================================================================================
      - name: Generate Changelog
        if: env.IS_PRERELEASE == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PREVIOUS_TAG="${{ env.previous_tag }}"

          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "0.0.0" ]; then
            NOTES="## Release ${{ env.tag }}\n\nInitial release"
          else
            CHANGES=$(git log v${PREVIOUS_TAG}..HEAD --no-merges --pretty=format:'- %s' \
              | grep -Ev '^- (ci|chore|build|style|test)(\(|:)' \
              | grep -Ev '^- 👷 CI:' \
              | sort -u \
              | head -20)
            if [ -z "$CHANGES" ]; then
              CHANGES="- Maintenance and stability improvements"
            fi
            NOTES="## Release ${{ env.tag }}\n\n### Changes since v${PREVIOUS_TAG}\n\n${CHANGES}"
          fi

          echo -e "$NOTES" > changelog.md
          cat changelog.md >> $GITHUB_STEP_SUMMARY

          # 转换为 HTML 供 appcast 使用
          RELEASE_NOTES_HTML=$(gh api markdown -F text=@changelog.md -f mode=gfm)
          echo "RELEASE_NOTES_HTML<<EOF" >> $GITHUB_ENV
          echo "$RELEASE_NOTES_HTML" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

          # 设置 release notes 链接
          RELEASE_NOTES_LINK="${{ env.REPO_LINK }}/releases/tag/${{ env.tag }}"
          echo "RELEASE_NOTES_LINK=$RELEASE_NOTES_LINK" >> $GITHUB_ENV

          echo "✅ Changelog generated and converted to HTML"

      # =================================================================================================
      # 3. Appcast 生成 (仅 Release 分支)
      # =================================================================================================
      - name: Generate Appcasts (per-arch)
        if: env.IS_PRERELEASE == 'false'
        run: |
          set -euo pipefail

          chmod +x .github/scripts/install-sparkle-tools.sh
          SPARKLE_BIN="$(SPARKLE_VERSION="${{ env.SPARKLE_VERSION }}" .github/scripts/install-sparkle-tools.sh)"

          if [ ! -x "$SPARKLE_BIN/generate_appcast" ]; then
            echo "❌ Sparkle generate_appcast not found at $SPARKLE_BIN"
            exit 1
          fi

          for arch in ${{ env.RELEASE_ARCHS }}; do
            DMG_FILE="${{ github.workspace }}/updates/${{ env.SCHEME }}_${{ env.new_version }}_${arch}.dmg"
            if [ ! -f "$DMG_FILE" ]; then
              echo "❌ DMG not found for $arch: $DMG_FILE"
              exit 1
            fi

            # 每个架构使用独立目录，避免 generate_appcast 混淆
            APPCAST_INPUT="${{ github.workspace }}/appcast_input_${arch}"
            rm -rf "$APPCAST_INPUT"
            mkdir -p "$APPCAST_INPUT"
            cp "$DMG_FILE" "$APPCAST_INPUT/"

            echo "🔑 Generating appcast for $arch..."
            APPCAST_FILE="$APPCAST_INPUT/appcast.xml"
            echo "${{ env.SPARKLE_PRIVATE_KEY }}" | "$SPARKLE_BIN/generate_appcast" \
              --ed-key-file - \
              -o "$APPCAST_FILE" \
              "$APPCAST_INPUT"

            if [ ! -f "$APPCAST_FILE" ]; then
              echo "❌ Appcast not generated at $APPCAST_FILE"
              ls -la "$APPCAST_INPUT" || true
              exit 1
            fi

            # 替换 enclosure url 为正确的下载链接
            DMG_FILENAME=$(basename "$DMG_FILE")
            DMG_URL_ENCODED=$(echo "$DMG_FILENAME" | sed 's/ /%20/g')
            DOWNLOAD_URL="${{ env.REPO_LINK }}/releases/download/${{ env.tag }}/$DMG_URL_ENCODED"
            sed -i '' 's|url="[^"]*"|url="'"$DOWNLOAD_URL"'"|g' "$APPCAST_FILE"

            # 注入 release notes HTML 到 appcast
            if [ -n "${RELEASE_NOTES_HTML:-}" ]; then
              export u="$DOWNLOAD_URL"
              export RELEASE_NOTES_HTML
              export RELEASE_NOTES_LINK="${{ env.RELEASE_NOTES_LINK }}"
              
              # 替换 enclosure url
              perl -i -pe 'if (!$done) { s/(enclosure url=")[^"]*/$1.$ENV{u}/e && ($done=1) }' "$APPCAST_FILE"
              
              # 注入 description 和 fullReleaseNotesLink
              perl -i -0777 -pe '
                if (!$done++) {
                  my $notes = $ENV{RELEASE_NOTES_HTML} // "";
                  my $link = $ENV{RELEASE_NOTES_LINK} // "";
                  my $insert = qq{\n            <description><![CDATA[$notes]]></description>\n            <sparkle:fullReleaseNotesLink>$link</sparkle:fullReleaseNotesLink>};
                  s/(<sparkle:minimumSystemVersion>[^<]+<\/sparkle:minimumSystemVersion>)(?!\s*<description)/$1$insert/s;
                }
              ' "$APPCAST_FILE"
              
              echo "✅ Release notes injected for $arch"
            fi

            # 输出到根目录
            cp "$APPCAST_FILE" "${{ github.workspace }}/appcast-${arch}.xml"

            echo "✅ appcast-${arch}.xml generated:"
            cat "${{ github.workspace }}/appcast-${arch}.xml"
          done

          # 兼容旧版本客户端（仍读取 appcast.xml），使用默认架构
          cp "${{ github.workspace }}/appcast-${{ env.DEFAULT_UPDATE_ARCH }}.xml" "${{ github.workspace }}/appcast.xml"

      # =================================================================================================
      # 4. 提交更改与推送
      # =================================================================================================
      - name: Commit and Push Changes
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: bump to ${{ env.new_version }}"
          commit_user_name: GitHub Action
          tagging_message: ${{ env.tag }}
          push_options: "--follow-tags"
          # 仅提交项目文件和appcast
          file_pattern: "Lumi.xcodeproj/project.pbxproj appcast.xml appcast-arm64.xml appcast-x86_64.xml"

      - name: Prepare Release Assets
        if: success()
        run: |
          rm -rf release-assets
          mkdir -p release-assets

          if ! compgen -G "./updates/*.dmg" > /dev/null; then
            echo "❌ No DMG found in updates directory"
            exit 1
          fi
          cp ./updates/*.dmg release-assets/

          if [ "${{ env.IS_PRERELEASE }}" = "false" ]; then
            if [ ! -f ./appcast.xml ]; then
              echo "❌ appcast.xml is required for stable releases"
              exit 1
            fi
            cp ./appcast.xml release-assets/
            cp ./appcast-arm64.xml release-assets/
            cp ./appcast-x86_64.xml release-assets/
          fi

          if compgen -G "./temp/*_dSYMs.zip" > /dev/null; then
            cp ./temp/*_dSYMs.zip release-assets/
          else
            echo "⚠️ dSYM zips not found, continuing without them"
          fi

          ls -alh release-assets

      # =================================================================================================
      # 5.5 上传到 Cloudflare R2
      # =================================================================================================
      - name: Upload to Cloudflare R2
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.COFFIC_APP_UPLOAD_KEY }}
          API_URL: https://data.kuaiyizhi.cn
        run: |
          set -euo pipefail

          # 上传 DMG
          if ! compgen -G "./release-assets/*.dmg" > /dev/null; then
            echo "⚠️  No DMG file found to upload"
          else
            for DMG_FILE in ./release-assets/*.dmg; do
              DMG_FILENAME=$(basename "$DMG_FILE")
              R2_KEY="lumi/${DMG_FILENAME}"

              echo "📤 Uploading DMG to R2: $R2_KEY"

              RESPONSE=$(curl -s -X POST "${API_URL}/lumi/upload" \
                -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
                -F "file=@${DMG_FILE}" \
                -F "key=${R2_KEY}")

              echo "Response: $RESPONSE"

              if echo "$RESPONSE" | grep -q '"success":true'; then
                R2_DMG_URL=$(echo "$RESPONSE" | grep -o '"url":"[^"]*' | cut -d'"' -f4)
                echo "✅ DMG uploaded: $R2_DMG_URL"
              else
                echo "❌ Failed to upload DMG to R2: $DMG_FILENAME"
                exit 1
              fi
            done
          fi

          # 上传 appcast (仅 Release)
          if [ "${{ env.IS_PRERELEASE }}" = "false" ]; then
            for APPCAST_FILE in ./release-assets/appcast.xml ./release-assets/appcast-arm64.xml ./release-assets/appcast-x86_64.xml; do
              if [ -f "$APPCAST_FILE" ]; then
                APPCAST_FILENAME=$(basename "$APPCAST_FILE")
                R2_KEY="lumi/${APPCAST_FILENAME}"

                echo "📤 Uploading appcast to R2: $R2_KEY"

                RESPONSE=$(curl -s -X POST "${API_URL}/lumi/upload" \
                  -H "X-Webhook-Secret: ${WEBHOOK_SECRET}" \
                  -F "file=@${APPCAST_FILE}" \
                  -F "key=${R2_KEY}")

                echo "Response: $RESPONSE"

                if echo "$RESPONSE" | grep -q '"success":true'; then
                  echo "✅ Appcast uploaded: $R2_KEY"
                else
                  echo "❌ Failed to upload appcast to R2: $APPCAST_FILENAME"
                  exit 1
                fi
              fi
            done
          fi

      # =================================================================================================
      # 6. 发布 Release
      # =================================================================================================
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.tag }}
          prerelease: ${{ env.IS_PRERELEASE }}
          body_path: changelog.md
          files: |
            ./release-assets/*

  rebase:
    if: github.ref == 'refs/heads/main'
    needs:
      - release_pipeline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Check pre branch
        id: check_pre
        run: |
          if git ls-remote --heads origin pre | grep -q pre; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: Rebase pre on main
        if: steps.check_pre.outputs.exists == 'true'
        continue-on-error: true
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git fetch origin pre
          git checkout pre
          if ! git rebase origin/main; then
            echo "## Rebase pre on main failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The release completed, but the pre branch could not be rebased automatically." >> "$GITHUB_STEP_SUMMARY"
            echo "Resolve the conflict locally and push pre manually." >> "$GITHUB_STEP_SUMMARY"
            git rebase --abort || true
            exit 1
          fi
          if ! git push origin pre --force-with-lease; then
            echo "## Push pre after rebase failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The release completed, but the rebased pre branch could not be pushed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
